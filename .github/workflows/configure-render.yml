name: Configure and Deploy LingBan Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'render.yaml'
      - '.github/workflows/configure-render.yml'

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_NAME: lingban
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Resolve Render service ID
        id: resolve
        run: |
          set -e
          echo "Looking up service $RENDER_SERVICE_NAME..."
          SERVICE_JSON=$(curl -fsSL \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$RENDER_SERVICE_NAME&limit=1")
          SERVICE_ID=$(echo "$SERVICE_JSON" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['service']['id'])")
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Update service build settings
        run: |
          set -e
          cat > /tmp/update.json <<'EOF'
          {
            "rootDir": "apps/server",
            "serviceDetails": {
              "envSpecificDetails": {
                "buildCommand": "npm install && npm run db:generate && npm run build",
                "startCommand": "npm run db:deploy 2>&1 || echo \"DB_DEPLOY_FAILED\"; npm start"
              }
            }
          }
          EOF
          curl -fsSL -X PATCH \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d @/tmp/update.json \
            "https://api.render.com/v1/services/${{ steps.resolve.outputs.service_id }}"

      - name: Set DATABASE_URL environment variable
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          set -e
          cat > /tmp/env.json <<EOF
          {"value": "$DATABASE_URL"}
          EOF
          curl -fsSL -X PUT \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d @/tmp/env.json \
            "https://api.render.com/v1/services/${{ steps.resolve.outputs.service_id }}/env-vars/DATABASE_URL"

      - name: Trigger deploy
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ steps.resolve.outputs.service_id }}/deploys"

      - name: Done
        run: echo "Render service configured and deploy triggered."

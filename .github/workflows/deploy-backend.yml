name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'render.yaml'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_NAME: lingban-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Render service ID
        id: resolve
        run: |
          set -e
          SERVICE_JSON=$(curl -fsSL \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$RENDER_SERVICE_NAME&limit=1")
          SERVICE_ID=$(echo "$SERVICE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['service']['id'])")
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ steps.resolve.outputs.service_id }}/deploys"

      - name: Deploy started
        run: echo "Render backend deploy triggered"

name: Check Render Deploy Status

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/render-status.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_NAME: lingban
    steps:
      - name: Resolve service and latest deploy
        run: |
          set -e
          SERVICE_JSON=$(curl -fsSL \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$RENDER_SERVICE_NAME&limit=1")
          SERVICE_ID=$(echo "$SERVICE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['service']['id'])")
          echo "Service ID: $SERVICE_ID"

          echo "=== Polling latest deploy (up to 5 min) ==="
          for i in $(seq 1 20); do
            DEPLOY_JSON=$(curl -fsSL \
              -H "Accept: application/json" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1")
            STATUS=$(echo "$DEPLOY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['deploy']['status'])")
            COMMIT=$(echo "$DEPLOY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['deploy']['commit']['id'][:7])")
            echo "[$i] commit=$COMMIT status=$STATUS"
            case "$STATUS" in
              build_in_progress|deploy_in_progress|created|updating) sleep 15;;
              *) echo ""; echo "=== Final deploy status: $STATUS ==="; echo "$DEPLOY_JSON" | python3 -m json.tool; break;;
            esac
          done

          echo ""
          echo "=== Service env vars (keys only) ==="
          curl -fsSL \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/env-vars" | python3 -m json.tool

          echo ""
          echo "=== Service details ==="
          curl -fsSL \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID" | python3 -m json.tool

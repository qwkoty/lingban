services:
  - type: web
    name: lingban-web
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: npx prisma generate && npx prisma migrate deploy && pnpm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: lingban-db
          property: connectionString

databases:
  - name: lingban-db
    plan: free
    databaseName: lingban
    user: lingban

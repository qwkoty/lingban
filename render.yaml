services:
  - type: web
    name: lingban
    runtime: node
    region: singapore
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: cd apps/server && npm run db:deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: API_KEY_ENCRYPTION_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

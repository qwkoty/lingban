services:
  - type: web
    name: lingban
    runtime: node
    plan: starter
    region: singapore
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm run db:deploy && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: lingban-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: lingban-db
    plan: starter
    region: singapore

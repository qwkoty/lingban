services:
  - type: web
    name: lingban
    runtime: node
    plan: starter
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: "npx prisma generate && (npx prisma migrate deploy || (echo 'migrate deploy failed, resetting schema' && npx tsx scripts/reset-db.ts && npx prisma migrate deploy)) && pnpm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: lingban-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: lingban-db
    plan: starter
    region: singapore

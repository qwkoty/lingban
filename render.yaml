databases:
  - name: lingban-db
    plan: free
    region: singapore

services:
  - type: web
    name: lingban
    runtime: node
    region: singapore
    plan: free
    branch: main
    rootDir: apps/server
    buildCommand: npm install && npm run db:generate && npm run build && npm run db:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lingban-db
          property: connectionString

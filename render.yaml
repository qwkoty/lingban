services:
  - type: web
    name: lingban
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lingban-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: lingban-db
    plan: starter
    region: singapore
    databaseName: lingban
    user: lingban
